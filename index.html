  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f3cb9bd6-e8a7-45c5-ac6a-b3076bb0cf2d\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  \n  <style>\n    *{box-sizing:border-box;}\n    html,body{margin:0;height:100%;}\n    body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#16302a;color:#1A1A1A;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}\n    button{font-family:inherit;}\n    input{font-family:inherit;}\n    @keyframes toastIn{0%{opacity:0;transform:translate(-50%,-10px) scale(.96);}100%{opacity:1;transform:translate(-50%,0) scale(1);}}\n    @keyframes overlayIn{0%{opacity:0;transform:translateY(14px) scale(.98);}100%{opacity:1;transform:translateY(0) scale(1);}}\n    @keyframes dimIn{0%{opacity:0;}100%{opacity:1;}}\n    @keyframes riseIn{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:translateY(0);}}\n    @keyframes turnPulse{0%,100%{box-shadow:0 0 0 0 rgba(168,213,200,0.55);}50%{box-shadow:0 0 0 6px rgba(168,213,200,0);}}\n    @keyframes playFromBottom{0%{opacity:0;transform:translateY(230px) scale(.82) rotate(2deg);}55%{opacity:1;}100%{opacity:1;transform:translateY(0) scale(1) rotate(0);}}\n    @keyframes playFromTop{0%{opacity:0;transform:translateY(-230px) scale(.82) rotate(-2deg);}55%{opacity:1;}100%{opacity:1;transform:translateY(0) scale(1) rotate(0);}}\n    @keyframes captureToBottom{0%{opacity:1;transform:translateY(0) scale(1);}30%{opacity:1;}100%{opacity:0;transform:translateY(260px) scale(.62) rotate(3deg);}}\n    @keyframes captureToTop{0%{opacity:1;transform:translateY(0) scale(1);}30%{opacity:1;}100%{opacity:0;transform:translateY(-260px) scale(.62) rotate(-3deg);}}\n    @keyframes spin{to{transform:rotate(360deg);}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ================= HOME ================= -->\n<sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n<div data-screen-label=\"Home\" style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:radial-gradient(130% 90% at 50% 0%,#27513f 0%,#1d4234 45%,#16302a 100%);\">\n  <div style=\"width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center;\">\n\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px;\">\n      <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" style=\"color:#C19A3E;\"><circle cx=\"12\" cy=\"12\" r=\"9\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M12 5 L13.6 12 L12 19 L10.4 12 Z\" fill=\"currentColor\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"1.5\" fill=\"#16302a\"><\u002Fcircle><\u002Fsvg>\n      <span style=\"font-size:13px;font-weight:700;letter-spacing:0.34em;text-transform:uppercase;color:#A8D5C8;\">Scopa<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;font-weight:600;font-size:52px;line-height:1.02;letter-spacing:-0.02em;color:#fff;margin:0 0 8px;text-align:center;\">The classic<br>Italian card game.<\u002Fh1>\n    <p style=\"font-size:15px;line-height:1.5;color:rgba(255,255,255,0.6);margin:0 0 30px;text-align:center;max-width:340px;\">Sweep the table, take the seven of coins, count your primiera. Play the computer or a friend on your network.<\u002Fp>\n\n    <!-- MENU -->\n    <sc-if value=\"{{ viewMenu }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"width:100%;display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"display:flex;gap:10px;\">\n          <label style=\"flex:1;display:flex;flex-direction:column;gap:5px;\">\n            <span style=\"font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);\">Your name<\u002Fspan>\n            <input value=\"{{ names.me }}\" onchange=\"{{ onNameMe }}\" maxlength=\"14\" placeholder=\"You\" style=\"width:100%;font-size:14px;font-weight:600;color:#fff;background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.14);border-radius:9px;padding:10px 12px;outline:none;\">\n          <\u002Flabel>\n          <label style=\"flex:1;display:flex;flex-direction:column;gap:5px;\">\n            <span style=\"font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);\">Opponent<\u002Fspan>\n            <input value=\"{{ names.opp }}\" onchange=\"{{ onNameOpp }}\" maxlength=\"14\" placeholder=\"Computer\" style=\"width:100%;font-size:14px;font-weight:600;color:#fff;background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.14);border-radius:9px;padding:10px 12px;outline:none;\">\n          <\u002Flabel>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;\">\n            <span style=\"font-size:16px;font-weight:800;color:#fff;\">Play the computer<\u002Fspan>\n            <span style=\"font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#A8D5C8;\">Offline<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);\">Difficulty<\u002Fspan>\n          <div style=\"display:flex;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:3px;gap:3px;margin:8px 0 16px;\">\n            <button onclick=\"{{ setDiffEasy }}\" style=\"{{ segEasy }}\">Easy<\u002Fbutton>\n            <button onclick=\"{{ setDiffNormal }}\" style=\"{{ segNormal }}\">Normal<\u002Fbutton>\n            <button onclick=\"{{ setDiffHard }}\" style=\"{{ segHard }}\">Hard<\u002Fbutton>\n            <button onclick=\"{{ setDiffExpert }}\" style=\"{{ segExpert }}\">Expert<\u002Fbutton>\n          <\u002Fdiv>\n          <button onclick=\"{{ playCpu }}\" style=\"width:100%;font-size:15px;font-weight:700;color:#16302a;background:#A8D5C8;border:none;border-radius:10px;padding:14px;cursor:pointer;transition:transform .16s,box-shadow .16s;\" style-hover=\"transform:translateY(-1px);box-shadow:0 8px 22px rgba(168,213,200,0.3);\">Start game<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:14px;\">\n          <button onclick=\"{{ gotoHost }}\" style=\"flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px;cursor:pointer;text-align:left;transition:border-color .16s,transform .16s;\" style-hover=\"border-color:#A8D5C8;transform:translateY(-1px);\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A8D5C8\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:10px;\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n            <div style=\"font-size:15px;font-weight:800;color:#fff;\">Host a game<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px;\">Create a room on your network<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ gotoJoin }}\" style=\"flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px;cursor:pointer;text-align:left;transition:border-color .16s,transform .16s;\" style-hover=\"border-color:#A8D5C8;transform:translateY(-1px);\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A8D5C8\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:10px;\"><path d=\"M19 12H5M12 19l-7-7 7-7\"><\u002Fpath><\u002Fsvg>\n            <div style=\"font-size:15px;font-weight:800;color:#fff;\">Join a game<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px;\">Enter a friend's room code<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <button onclick=\"{{ openScores }}\" style=\"display:flex;align-items:center;justify-content:center;gap:9px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px;cursor:pointer;color:#A8D5C8;font-size:13px;font-weight:700;letter-spacing:0.03em;transition:border-color .16s;\" style-hover=\"border-color:#A8D5C8;\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 3h12v5a6 6 0 0 1-12 0Z\"><\u002Fpath><path d=\"M6 5H3v2a3 3 0 0 0 3 3M18 5h3v2a3 3 0 0 1-3 3M9 21h6M12 14v7\"><\u002Fpath><\u002Fsvg>\n          <span>Scorecard<\u002Fspan>\n          <sc-if value=\"{{ hasHistory }}\" hint-placeholder-val=\"\"><span style=\"color:rgba(255,255,255,0.4);font-weight:600;\">· {{ historyCount }} played<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- HOST LOBBY -->\n    <sc-if value=\"{{ viewHost }}\" hint-placeholder-val=\"\">\n      <div style=\"width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;text-align:center;\">\n        <span style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#A8D5C8;\">Host a game<\u002Fspan>\n        <sc-if value=\"{{ hasCode }}\" hint-placeholder-val=\"\">\n          <div style=\"font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;font-weight:600;font-size:58px;letter-spacing:0.16em;color:#fff;margin:10px 0 4px;padding-left:0.16em;\">{{ net.code }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:18px;\">Share this code with your opponent.<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;justify-content:center;fo       <button onclick=\"{{ overlayAction }}\" style=\"font-size:14px;font-weight:700;color:#fff;background:#22493D;border:none;border-radius:8px;padding:11px 22px;cursor:pointer;transition:transform .16s,background .16s;\" style-hover=\"background:#1a3830;transform:translateY(-1px);\">{{ overlayCta }}<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ waitHost }}\" hint-placeholder-val=\"\"><div style=\"font-size:13px;color:#888;font-style:italic;\">Waiting for host…<\u002Fdiv><\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- Disconnect overlay -->\n<sc-if value=\"{{ showDisconnect }}\" hint-placeholder-val=\"\">\n  <div style=\"position:fixed;inset:0;z-index:60;background:rgba(10,24,20,0.78);display:flex;align-items:center;justify-content:center;padding:24px;animation:dimIn .2s ease both;\">\n    <div style=\"width:380px;max-width:100%;background:#fff;border-radius:14px;padding:28px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.4);\">\n      <div style=\"font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;font-weight:600;font-size:22px;color:#22493D;\">{{ disconnectTitle }}<\u002Fdiv>\n      <p style=\"font-size:14px;color:#666;line-height:1.5;margin:10px 0 22px;\">{{ disconnectBody }}<\u002Fp>\n      <button onclick=\"{{ backToMenu }}\" style=\"font-size:14px;font-weight:700;color:#fff;background:#22493D;border:none;border-radius:8px;padding:12px 26px;cursor:pointer;\">Back to menu<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{ &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 820 } }\">\nclass Component extends DCLogic {\n  SUITS = ['coins','cups','swords','batons'];\n  SUITLABEL = { coins:'Denari', cups:'Coppe', swords:'Spade', batons:'Bastoni' };\n  PRIME = { 1:16, 2:12, 3:13, 4:14, 5:15, 6:18, 7:21, 8:10, 9:10, 10:10 };\n  PIPS = {\n    1:[[.5,.5]], 2:[[.5,.27],[.5,.73]], 3:[[.5,.2],[.5,.5],[.5,.8]],\n    4:[[.3,.26],[.7,.26],[.3,.74],[.7,.74]],\n    5:[[.3,.24],[.7,.24],[.5,.5],[.3,.76],[.7,.76]],\n    6:[[.3,.2],[.7,.2],[.3,.5],[.7,.5],[.3,.8],[.7,.8]],\n    7:[[.3,.18],[.7,.18],[.3,.43],[.7,.43],[.5,.61],[.3,.82],[.7,.82]],\n  };\n  ROUND_FIELDS = ['scores','dealer','roundNo','deck','table','playerHand','aiHand','playerPile','aiPile','playerScopa','aiScopa','lastCapturer','anim','turn','phase','toast','roundResult','winner'];\n\n  state = Object.assign({\n    screen:'home', mode:'cpu', seat:null,\n    vw:(typeof window!=='undefined'?window.innerWidth:1200),\n    vh:(typeof window!=='undefined'?window.innerHeight:800),\n    net:{ view:'menu', status:'idle', code:'', err:'', serverInput:'' },\n    settings:{ difficulty:'Normal', target:'11', speed:'Relaxed', highlight:true },\n    names:this.loadNames(), history:this.loadHistory(),\n  }, this.startRound({ player:0, ai:0 }, 'ai', 1, []));\n\n  componentDidMount(){\n    this._onResize = ()=> this.setState({ vw:window.innerWidth, vh:window.innerHeight });\n    window.addEventListener('resize', this._onResize);\n    const m = (location.hash||'').match(/room=([A-Za-z0-9]+)/);\n    if (m) this.setState(s=>({ net:{ ...s.net, view:'join', code:m[1].toUpperCase() } }));\n  }\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._onResize);\n    try{ this.ws && this.ws.close(); }catch(e){}\n  }\n\n  // ---------- setup ----------\n  target(){ return parseInt(this.state.settings.target, 10) || 11; }\n  aiDelay(){ return this.state.settings.speed === 'Fast' ? 480 : 950; }\n  setSetting(k,v){ this.setState(s=>({ settings:{ ...s.settings, [k]:v } })); }\n\n  // ---------- persistence: names + scorecard ----------\n  loadNames(){ try{ const j=JSON.parse(localStorage.getItem('scopa.names')||'null'); if (j&&typeof j==='object') return { me:(j.me||'You'), opp:(j.opp||'Computer') }; }catch(e){} return { me:'You', opp:'Computer' }; }\n  saveNames(n){ try{ localStorage.setItem('scopa.names', JSON.stringify(n)); }catch(e){} }\n  setName(which, v){ this.setState(s=>{ const names={ ...s.names, [which]:v }; this.saveNames(names); return { names }; }); }\n  loadHistory(){ try{ const j=JSON.parse(localStorage.getItem('scopa.history')||'[]'); return Array.isArray(j)?j:[]; }catch(e){ return []; } }\n  saveHistory(h){ try{ localStorage.setItem('scopa.history', JSON.stringify(h.slice(0,100))); }catch(e){} }\n  clearHistory(){ this.saveHistory([]); this.setState({ history:[] }); }\n  openScores(){ this.setState({ screen:'scores' }); }\n  closeScores(){ this.setState({ screen:'home' }); }\n  recordResult(st){\n    if (this._recorded || !st || st.phase!=='game-over') return;\n    this._recorded=true;\n    const meKey=this.meKey();\n    const meScore = meKey==='player'?st.scores.player:st.scores.ai;\n    const oppScore = meKey==='player'?st.scores.ai:st.scores.player;\n    const meName=(this.state.names.me||'You');\n    const oppName=this.state.mode==='online'?(this.state.names.opp||'Opponent'):(this.state.names.opp||'Computer');\n    const entry={ date:Date.now(), me:meName, opp:oppName, meScore, oppScore, win:(meScore>oppScore?'me':'opp'), mode:this.state.mode };\n    this.setState(s=>{ const history=[entry].concat(s.history); this.saveHistory(history); return { history }; });\n  }\n  buildDeck(){ const d=[]; for (const s of this.SUITS) for (let r=1;r<=10;r++) d.push({ suit:s, rank:r, value:r, id:s+'-'+r }); return d; }\n  shuffle(a){ a=a.slice(); for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }\n  other(w){ return w==='player' ? 'ai' : 'player'; }\n\n  startRound(scores, dealer, roundNo, log){\n    let deck, table;\n    do { deck=this.shuffle(this.buildDeck()); table=deck.splice(0,4); } while (table.filter(c=>c.value===10).length>=3);\n    const playerHand=deck.splice(0,3), aiHand=deck.splice(0,3);\n    return {\n      scores, dealer, roundNo, deck, table, playerHand, aiHand,\n      playerPile:[], aiPile:[], playerScopa:0, aiScopa:0, lastCapturer:null,\n      anim:{ placedId:null, outIds:[], who:null },\n      turn: dealer==='ai' ? 'player' : 'ai',\n      phase:'playing', pending:null, toast:null, roundResult:null, winner:null,\n      log:(log||[]).slice(-6),\n    };\n  }\n\n  // ---------- roles ----------\n  isOnline(){ return this.state.mode==='online'; }\n  isCpu(){ return this.state.mode==='cpu'; }\n  isHost(){ return this.state.mode==='cpu' || this.state.seat==='host'; }\n  seatIsGuest(){ return this.state.seat==='guest'; }\n  meKey(){ return (this.state.mode==='online' && this.state.seat==='guest') ? 'ai' : 'player'; }\n  oppKey(){ return this.meKey()==='player' ? 'ai' : 'player'; }\n\n  // ---------- rules ----------\n  findSets(table, value){\n    const singles=[]; table.forEach((c,i)=>{ if (c.value===value) singles.push([i]); });\n    if (singles.length) return { forced:true, sets:singles };\n    const sets=[], n=table.length;\n    const rec=(start,sum,acc)=>{ if (acc.length>=2 && sum===value) sets.push(acc.slice()); if (sum>=value) return;\n      for (let i=start;i<n;i++){ const v=table[i].value; if (sum+v>value) continue; acc.push(i); rec(i+1,sum+v,acc); acc.pop(); } };\n    rec(0,0,[]); return { forced:false, sets };\n  }\n  setMatch(sel, sets){ return sets.some(s=> s.length===sel.length && s.every(i=>sel.includes(i))); }\n  cloneState(s){ return { ...s, deck:s.deck.slice(), table:s.table.slice(), playerHand:s.playerHand.slice(), aiHand:s.aiHand.slice(), playerPile:s.playerPile.slice(), aiPile:s.aiPile.slice(), log:s.log.slice() }; }\n  cardName(c){ const r=c.rank===1?'Asso':c.rank===8?'Fante':c.rank===9?'Cavallo':c.rank===10?'Re':String(c.rank); return r+' of '+this.SUITLABEL[c.suit]; }\n\n  // ---------- move pipeline ----------\n  doMove(who, handIndex, chosenSet){\n    const st=this.cloneState(this.state);\n    const hand = st[who==='player'?'playerHand':'aiHand'];\n    const card = hand.splice(handIndex,1)[0];\n    if (!card) return;\n    const { sets } = this.findSets(st.table, card.value);\n    const chosen = sets.length>0 ? (chosenSet || sets[0]) : null;\n    st.table = st.table.concat([card]);\n    st.pending=null; st.turn=null;\n    st.anim={ placedId:card.id, outIds:[], who };\n    this.setState(st, ()=>{ this.hostBroadcast(); setTimeout(()=> this.resolveMove(who, card.id, chosen), 1050); });\n  }\n  resolveMove(who, cardId, chosen){\n    const st=this.cloneState(this.state);\n    const card = st.table.find(c=>c.id===cardId);\n    if (chosen){\n      const taken = chosen.map(i=>st.table[i]);\n      const remaining = st.table.length - taken.length - 1;\n      let scopa=false;\n      if (remaining===0){ const isLast = st.deck.length===0 && st.playerHand.length===0 && st.aiHand.length===0; if (!isLast) scopa=true; }\n      st.anim={ placedId:null, outIds: taken.map(c=>c.id).concat([cardId]), who };\n      if (scopa) st.toast={ text:'Scopa!', sub:(who===this.meKey()?'You swept the table':(this.isOnline()?'Opponent swept the table':'Computer swept the table')), key:Date.now() };\n      this.setState(st, ()=>{ this.hostBroadcast(); if (st.toast) this.scheduleToastClear(st.toast.key); setTimeout(()=> this.commitMove(who, cardId, chosen, scopa), 1100); });\n    } else { this.commitMove(who, cardId, null, false); }\n  }\n  commitMove(who, cardId, chosen, scopa){\n    const st=this.cloneState(this.state);\n    const pileKey = who==='player'?'playerPile':'aiPile';\n    const scopaKey = who==='player'?'playerScopa':'aiScopa';\n    const card = st.table.find(c=>c.id===cardId);\n    const label = who===this.meKey() ? 'You' : (this.isOnline()?'Opponent':'Computer');\n    if (chosen){\n      const taken = chosen.map(i=>st.table[i]);\n      const removeSet = new Set(taken.map(c=>c.id).concat([cardId]));\n      st.table = st.table.filter(c=>!removeSet.has(c.id));\n      st[pileKey] = st[pileKey].concat(taken, [card]);\n      st.lastCapturer = who;\n      if (scopa) st[scopaKey] = st[scopaKey] + 1;\n      st.log = st.log.concat([ label+' played '+this.cardName(card)+', took '+taken.length+(scopa?' — Scopa!':'') ]).slice(-6);\n    } else {\n      st.log = st.log.concat([ label+' played '+this.cardName(card)+' to the table' ]).slice(-6);\n    }\n    st.anim={ placedId:null, outIds:[], who:null };\n    st.turn = this.other(who);\n    let roundEnded=false;\n    if (st.playerHand.length===0 && st.aiHand.length===0){\n      if (st.deck.length>0){ st.playerHand=st.deck.splice(0,3); st.aiHand=st.deck.splice(0,3); }\n      else roundEnded=true;\n    }\n    if (roundEnded) this.endRound(st);\n    this.setState(st, ()=>{ this.hostBroadcast(); if (this.isCpu() && st.phase==='playing' && st.turn==='ai') this.scheduleAi(); });\n  }\n  scheduleAi(){ setTimeout(()=>this.aiMove(), this.aiDelay()); }\n  scheduleToastClear(key){ setTimeout(()=>{ if (this.state.toast && this.state.toast.key===key) this.setState({ toast:null }); }, 2600); }\n\n  // ---------- AI ----------\n  aiMove(){\n    const s=this.state;\n    if (s.mode!=='cpu' || s.phase!=='playing' || s.turn!=='ai') return;\n    const diff=s.settings.difficulty||'Normal';\n    const moves=[];\n    s.aiHand.forEach((card,i)=>{ const { sets }=this.findSets(s.table, card.value);\n      if (sets.length>0) sets.forEach(set=> moves.push({ i, set, capture:true, card, taken:set.map(j=>s.table[j]) }));\n      else moves.push({ i, set:null, capture:false, card }); });\n    if (!moves.length) return;\n    if (diff==='Easy'){\n      const caps=moves.filter(m=>m.capture);\n      const pick=(caps.length && Math.random()<0.6) ? caps[Math.floor(Math.random()*caps.length)] : moves[Math.floor(Math.random()*moves.length)];\n      this.doMove('ai', pick.i, pick.set); return;\n    }\n    let best=null;\n    moves.forEach(m=>{\n      let sc = m.capture ? this.evalCapture(m.card, m.taken, s) : this.evalDiscard(m.card, s);\n      if (diff==='Normal') sc += (Math.random()*7-3.5);\n      if (diff==='Hard'||diff==='Expert') sc -= this.opponentThreat(m, mpact ? 'display:none;' : 'background:#1a3830;width:320px;flex:0 0 320px;border-left:1px solid rgba(255,255,255,0.08);padding:18px;display:flex;flex-direction:column;gap:15px;overflow:auto;';\n    const backStyle = 'width:'+Math.round(60*scale)+'px;height:'+Math.round(90*scale)+'px;border-radius:9px;background:linear-gradient(160deg,#2c5a4b,#1f4035);border:1px solid rgba(168,213,200,0.22);display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:0 3px 8px rgba(0,0,0,0.3);';\n\n    const seg=(a)=>'font-family:inherit;font-size:11px;font-weight:700;border:none;border-radius:5px;padding:5px 12px;cursor:pointer;transition:background .15s,color .15s;'+(a?'background:#A8D5C8;color:#16302a;':'background:transparent;color:rgba(255,255,255,0.6);');\n    const segD=(a)=>'flex:1;font-family:inherit;font-size:11px;font-weight:700;border:none;border-radius:5px;padding:6px 4px;cursor:pointer;transition:background .15s,color .15s;'+(a?'background:#A8D5C8;color:#16302a;':'background:transparent;color:rgba(255,255,255,0.6);');\n    const tt=s.settings.target, hi=s.settings.highlight, df=s.settings.difficulty;\n\n    const badge=(w)=>'display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:999px;font-size:12px;font-weight:800;flex:0 0 auto;'+(w?'background:#22493D;color:#fff;':'background:#EAF6F2;color:#bbb;');\n    let resultRows=[]; const r=s.roundResult;\n    if (r){\n      const me=meKey==='player'?r.player:r.ai, op=meKey==='player'?r.ai:r.player;\n      resultRows=[\n        { label:'Most cards', me:me.cards, opp:op.cards, meInfo:me.cardsCount, oppInfo:op.cardsCount, meBadge:badge(me.cards>0), oppBadge:badge(op.cards>0) },\n        { label:'Most denari', me:me.coins, opp:op.coins, meInfo:me.coinsCount, oppInfo:op.coinsCount, meBadge:badge(me.coins>0), oppBadge:badge(op.coins>0) },\n        { label:'Settebello', me:me.settebello, opp:op.settebello, meInfo:me.settebello?'held':'—', oppInfo:op.settebello?'held':'—', meBadge:badge(me.settebello>0), oppBadge:badge(op.settebello>0) },\n        { label:'Primiera', me:me.primiera, opp:op.primiera, meInfo:me.primVal, oppInfo:op.primVal, meBadge:badge(me.primiera>0), oppBadge:badge(op.primiera>0) },\n        { label:'Scopa', me:me.scopa, opp:op.scopa, meInfo:me.scopa, oppInfo:op.scopa, meBadge:badge(me.scopa>0), oppBadge:badge(op.scopa>0) },\n      ];\n    }\n    const roundMe = r?(meKey==='player'?r.player.total:r.ai.total):0;\n    const roundOpp = r?(meKey==='player'?r.ai.total:r.player.total):0;\n    const over = s.screen==='game' && (s.phase==='round-over'||s.phase==='game-over');\n    const canAdvance = over && this.isHost();\n    const waitHost = over && !this.isHost();\n\n    const nv=s.net, nstatusText=({connecting:'Connecting to server…',hosting:'Creating game…',waiting:'Waiting for your opponent to join…',joining:'Joining game…','waiting-host':'Connected. Waiting for the game to start…'})[nv.status]||'';\n\n    // scorecard\n    const hist=s.history||[];\n    const fmtDate=(t)=>{ try{ const d=new Date(t); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } };\n    const historyRows=hist.map(g=>({\n      key:String(g.date), date:fmtDate(g.date),\n      me:g.me, opp:g.opp, meScore:g.meScore, oppScore:g.oppScore,\n      winnerText:(g.win==='me'?g.me:g.opp)+' won',\n      meWin:g.win==='me',\n      rowAccent:(g.win==='me'?'#A8D5C8':'rgba(255,255,255,0.18)'),\n    }));\n    const winsMe=hist.filter(g=>g.win==='me').length, winsOpp=hist.filter(g=>g.win==='opp').length;\n\n    return {\n      // screens\n      isHome: s.screen==='home', isGame: s.screen==='game', isScores: s.screen==='scores',\n      // names + scorecard\n      names:s.names, meName,\n      onNameMe:(e)=>this.setName('me', e.target.value), onNameOpp:(e)=>this.setName('opp', e.target.value),\n      openScores:()=>this.openScores(), closeScores:()=>this.closeScores(), clearHistory:()=>this.clearHistory(),\n      historyRows, hasHistory:hist.length>0, noHistory:hist.length===0, historyCount:hist.length,\n      winsMe, winsOpp,\n      viewMenu: nv.view==='menu', viewHost: nv.view==='host', viewJoin: nv.view==='join',\n      hasCode: !!nv.code, noCode: !nv.code, netError: nv.status==='error' && !!nv.err,\n      netBusy: ['connecting','joining','waiting-host'].includes(nv.status),\n      net:nv, netStatusText:nstatusText,\n      // top bar\n      modeBadge: s.mode==='online' ? (s.seat==='host'?'Host':'Online') : 'vs Computer',\n      meScore, oppScore, oppShort: s.mode==='online'?'Opp':'CPU',\n      // board\n      oppLabel, myHand, table, oppBacks,\n      tableEmpty: s.table.length===0, deckCount:s.deck.length,\n      meStat, oppStat, status, statusDotColor:dot, statusDotAnim:dotAnim,\n      tableMinH: Math.round(112*scale)+'px',\n      pending: !!pd, pendingTarget: pd?s.table&&meHand[pd.handIndex].value:0,\n      sumSel: pd?pd.sel.reduce((a,i)=>a+s.table[i].value,0):0,\n      onCancel: ()=>this.onCancel(),\n      mainStyle, feltStyle, panelStyle, backStyle,\n      log: s.log.slice().reverse(),\n      showTweaks: s.mode==='cpu',\n      target:this.target(),\n      // tweaks\n      segEasy:segD(df==='Easy'), segNormal:segD(df==='Normal'), segHard:segD(df==='Hard'), segExpert:segD(df==='Expert'),\n      setDiffEasy:()=>this.setSetting('difficulty','Easy'), setDiffNormal:()=>this.setSetting('difficulty','Normal'),\n      setDiffHard:()=>this.setSetting('difficulty','Hard'), setDiffExpert:()=>this.setSetting('difficulty','Expert'),\n      seg11:seg(tt==='11'), seg21:seg(tt==='21'),\n      setTarget11:()=>this.setSetting('target','11'), setTarget21:()=>this.setSetting('target','21'),\n      toggleHighlight:()=>this.setSetting('highlight', !hi),\n      toggleStyle:'position:relative;width:40px;height:22px;border:none;border-radius:999px;cursor:pointer;padding:0;transition:background .18s;background:'+(hi?'#A8D5C8':'rgba(255,255,255,0.15)')+';',\n      toggleKnob:'position:absolute;top:2px;left:'+(hi?'20px':'2px')+';width:18px;height:18px;border-radius:50%;background:#fff;transition:left .18s;display:block;',\n      // home actions\n      playCpu:()=>this.playCpu(), gotoHost:()=>this.gotoHost(), gotoJoin:()=>this.gotoJoin(),\n      doJoin:()=>this.doJoin(), cancelNet:()=>this.cancelNet(),\n      onCodeInput:(e)=>this.onCodeInput(e), onServerInput:(e)=>this.onServerInput(e),\n      backToMenu:()=>this.backToMenu(),\n      // toast / overlays\n      toast:s.toast,\n      showOverlay: over, resultRows, roundMe, roundOpp,\n      overlayEyebrow: s.phase==='game-over'?'Game over':('Round '+s.roundNo),\n      overlayTitle: s.phase==='game-over'?(s.winner===meKey?'You win':oppLabel+' wins'):'Round results',\n      overlayCta: s.phase==='game-over'?'Play again':'Next round',\n      overlayAction: s.phase==='game-over'?()=>this.newGame():()=>this.nextRound(),\n      canAdvance, waitHost,\n      showDisconnect: s.screen==='game' && (s.phase==='disconnected'||s.phase==='opp-left'),\n      disconnectTitle: s.phase==='opp-left'?'Opponent left':'Connection lost',\n      disconnectBody: s.phase==='opp-left'?'Your opponent disconnected from the game.':'The connection to the game server was lost.',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
